<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0F1E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Track your bodyweight max reps — push-ups, pull-ups, sit-ups, squats. Daily streaks, XP, and progress charts." />
  <title>RepMax Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #060C1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    button { font-family: inherit; }
    input { font-family: inherit; }
    button:active { transform: scale(0.96); }
    @keyframes slideDown {
      from { transform: translateY(-24px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    @keyframes popIn {
      0%   { transform: scale(0.8); opacity: 0; }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1);   opacity: 1; }
    }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    @media (max-width: 430px) {
      .phone-wrap { width: 100vw !important; height: 100svh !important; border-radius: 0 !important; border: none !important; }
    }
  </style>
</head>

/* ─── Achievements ──────────────────────────────────────────────── */
const ACHS = [

/* ─── Helpers ───────────────────────────────────────────────────── */
const todayStr = () => new Date().toISOString().split("T")[0];

const fmtDate = ds => new Date(ds+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});

function calcStreak(logs) {
  const dates = new Set(logs.map(l => l.date));
  const today = todayStr();
  let streak = 0;
  const d = new Date();
  if (!dates.has(today)) d.setDate(d.getDate() - 1);
  for (let i = 0; i < 400; i++) {
    const ds = d.toISOString().split("T")[0];
    if (dates.has(ds)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

const XP_THRESHOLDS = [0,500,1200,2000,3000,4500,6500,9000,12000,16000,21000];
function calcLevel(totalXP) {
  let xp = totalXP, level = 1;
  while (level < XP_THRESHOLDS.length-1 && xp >= XP_THRESHOLDS[level]) {
    xp -= XP_THRESHOLDS[level]; level++;
  }
  const needed = XP_THRESHOLDS[Math.min(level, XP_THRESHOLDS.length-1)] || 25000;
  return { level, xpInLevel: xp, xpNeeded: needed };
}

function calcTotalXP(logs) {
  return 500 + logs.reduce((s,l) => s+(l.xp||100), 0);
}

function calcPRs(logs) {
  return EXES.reduce((acc,ex) => {
    acc[ex.id] = logs.length ? Math.max(0,...logs.map(l=>l[ex.id]||0)) : 0;
    return acc;
  }, {});
}

/* ─── LocalStorage I/O ──────────────────────────────────────────── */
const LS_KEY = "repmax_v2";
function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}
function saveData(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
}

/* ─── Toast ─────────────────────────────────────────────────────── */
function Toast({ msg, type }) {
  if (!msg) return null;
  const bg = type === "success" ? C.green : C.danger;
  return (
    <div style={{
      position:"absolute", top:60, left:12, right:12, zIndex:200,
      background:bg, borderRadius:14, padding:"13px 16px",
      color:"#fff", fontWeight:700, fontSize:14, textAlign:"center",
      boxShadow:`0 6px 28px ${bg}55`,
      animation:"slideDown 0.3s ease",
    }}>{msg}</div>
  );
}

/* ─── Home Page ─────────────────────────────────────────────────── */

  const xpPct = Math.min(100,(xpInLevel/xpNeeded)*100);
  const today = new Date();
  const last7 = useMemo(() => {
    return Array.from({length:7}, (_,i) => {
      const d = new Date(today); d.setDate(d.getDate()-(6-i));
      const ds = d.toISOString().split("T")[0];
      const log = logs.find(l=>l.date===ds);
      return { day:d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,1), done:!!log };
    });

  return (

      <div style={{display:"flex", gap:10}}>

          <div>
            <div style={{fontSize:26,fontWeight:900,color:streak>0?C.orange:C.muted,lineHeight:1}}>{streak}</div>
            <div style={{fontSize:11,color:C.muted,fontWeight:600}}>day streak</div>
          </div>
        </div>
        <div style={{flex:1, background:C.surf, borderRadius:16, padding:"14px 16px", border:`1px solid ${C.border}`, display:"flex", flexDirection:"column", justifyContent:"center", gap:7}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              <Ic.Zap sz={13} c={C.gold}/>
              <span style={{fontSize:11,color:C.muted,fontWeight:700}}>Level {level}</span>
            </div>
            <span style={{fontSize:11,color:C.gold,fontWeight:700}}>{xpInLevel}/{xpNeeded}</span>
          </div>
          <div style={{height:6,borderRadius:99,background:C.border}}>
            <div style={{height:6,borderRadius:99,width:`${xpPct}%`,background:`linear-gradient(90deg,${C.gold},${C.orange})`,transition:"width 0.6s"}}/>
          </div>
        </div>
      </div>

      {/* Week view */}
      <div style={{background:C.surf, borderRadius:16, padding:"14px 16px", border:`1px solid ${C.border}`}}>

        <div style={{display:"flex", justifyContent:"space-between"}}>

              <div style={{
                width:36,height:36,borderRadius:10,
                background:d.done?`${C.green}20`:C.surf2,
                border:`2px solid ${d.done?C.green:C.border}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                transition:"all 0.2s",
              }}>
                {d.done && <Ic.Check sz={16} c={C.green}/>}
              </div>
              <span style={{fontSize:10,color:d.done?C.green:C.muted,fontWeight:700}}>{d.day}</span>
            </div>
          ))}
        </div>
      </div>

      {/* CTA */}
      {!todayLogged ? (
        <button onClick={()=>setPage("log")} style={{
          border:"none",cursor:"pointer",
          background:`linear-gradient(135deg,#16A34A,#22C55E)`,
          borderRadius:18,padding:"20px 22px",textAlign:"left",
          boxShadow:`0 10px 36px ${C.green}44`,
          transition:"transform 0.2s, box-shadow 0.2s",
        }}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",fontWeight:700,letterSpacing:.8,marginBottom:4}}>TODAY'S CHALLENGE</div>
          <div style={{fontSize:20,color:"#fff",fontWeight:900}}>Log your max reps</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.8)",marginTop:4}}>Beat your PRs to earn bonus XP</div>
          <div style={{marginTop:14,background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"10px 14px",display:"flex",justifyContent:"space-between"}}>
            {EXES.map(ex=>(

                <ex.Icon sz={15} c="#fff"/>

              <div style={{width:32,height:32,borderRadius:9,background:`${ex.color}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

              <span style={{fontSize:11,color:C.muted,fontWeight:600,lineHeight:1.2}}>{ex.label}</span>
            </div>
            <div style={{fontSize:30,fontWeight:900,color:ex.color,lineHeight:1}}>{prs[ex.id]}</div>

/* ─── Progress Page ─────────────────────────────────────────────── */
function ProgressPage({ logs, prs }) {
  const [activeEx, setActiveEx] = useState(0);
  const [range, setRange] = useState("30");

  const ex = EXES[activeEx];

  const chartData = useMemo(() => {
    const sorted = [...logs].sort((a,b)=>a.date.localeCompare(b.date));
    const cutoff = range==="all" ? null : (() => {
      const d=new Date(); d.setDate(d.getDate()-parseInt(range)); return d.toISOString().split("T")[0];
    })();
    return sorted.filter(l=>!cutoff||l.date>=cutoff).map(l=>({ date:fmtDate(l.date), val:l[ex.id]||0 }));
  }, [logs, activeEx, range]);

  const sortedLogs = useMemo(() => [...logs].sort((a,b)=>a.date.localeCompare(b.date)), [logs]);
  const firstVal = sortedLogs.length ? (sortedLogs[0][ex.id]||0) : 0;
  const lastVal  = sortedLogs.length ? (sortedLogs[sortedLogs.length-1][ex.id]||0) : 0;
  const improvePct = firstVal > 0 ? Math.round(((lastVal-firstVal)/firstVal)*100) : 0;

  return (
    <div style={{padding:"0 14px 110px",display:"flex",flexDirection:"column",gap:14}}>
      {/* Exercise tabs */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
        {EXES.map((e,i)=>(
          <button key={e.id} onClick={()=>setActiveEx(i)} style={{
            border:activeEx===i?"none":`1px solid ${C.border}`,
            borderRadius:10,padding:"8px 14px",cursor:"pointer",flexShrink:0,
            background:activeEx===i?`linear-gradient(135deg,${e.g[0]},${e.g[1]})`:C.surf,
            color:activeEx===i?"#fff":C.muted,fontSize:13,fontWeight:700,transition:"all 0.2s",
          }}>{e.label}</button>
        ))}
      </div>
      {/* Range tabs */}
      <div style={{display:"flex",gap:6}}>
        {[["7","7 Days"],["30","30 Days"],["all","All Time"]].map(([v,l])=>(
          <button key={v} onClick={()=>setRange(v)} style={{
            border:`1px solid ${range===v?ex.color:C.border}`,
            borderRadius:8,padding:"6px 12px",cursor:"pointer",
            background:range===v?`${ex.color}18`:C.surf,
            color:range===v?ex.color:C.muted,fontSize:12,fontWeight:700,transition:"all 0.2s",
          }}>{l}</button>
        ))}
      </div>
      {/* Chart card */}
      <div style={{background:C.surf,borderRadius:18,padding:"16px 16px",border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{fontSize:12,color:C.muted,fontWeight:600}}>{ex.label} · Personal Best</div>
            <div style={{fontSize:32,fontWeight:900,color:ex.color,lineHeight:1.1}}>
              {prs[ex.id]} <span style={{fontSize:14,color:C.muted,fontWeight:500}}>reps</span>
            </div>
            {improvePct !== 0 && (
              <div style={{fontSize:12,color:improvePct>0?C.green:C.danger,fontWeight:700,marginTop:3}}>
                {improvePct>0?"+":""}{improvePct}% since you started
              </div>
            )}
          </div>
          <div style={{width:40,height:40,borderRadius:11,background:`${ex.color}22`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <ex.Icon sz={20} c={ex.color}/>
          </div>
        </div>
        {chartData.length > 1 ? (
          <ResponsiveContainer width="100%" height={170}>
            <LineChart data={chartData} margin={{top:5,right:5,bottom:0,left:-30}}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
              <XAxis dataKey="date" tick={{fill:C.muted,fontSize:9}} tickLine={false} axisLine={false}/>
              <YAxis tick={{fill:C.muted,fontSize:9}} tickLine={false} axisLine={false}/>
              <Tooltip
                contentStyle={{background:C.surf2,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:12}}
                labelStyle={{color:C.muted,marginBottom:4}}
              />
              <Line type="monotone" dataKey="val" stroke={ex.color} strokeWidth={3} dot={{fill:ex.color,r:4,strokeWidth:0}} name="Reps" activeDot={{r:6,strokeWidth:0}}/>
            </LineChart>
          </ResponsiveContainer>
        ) : (
          <div style={{height:170,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8}}>
            <Ic.Chart sz={32} c={C.muted}/>
            <span style={{color:C.muted,fontSize:13}}>Log more sessions to see your chart</span>
          </div>
        )}
      </div>

      {/* All PRs summary */}
      <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:.8}}>ALL-TIME RECORDS</div>
      {EXES.map(e=>(
        <div key={e.id} style={{background:C.surf,borderRadius:16,padding:"14px 16px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${e.g[0]},${e.g[1]})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

            <div style={{fontSize:14,fontWeight:700,color:C.text}}>{e.label}</div>

/* ─── App ───────────────────────────────────────────────────────── */
function App() {
  const initState = () => {
    const saved = loadData();
    return {
      logs: saved?.logs || [],
      notifEnabled: saved?.notifEnabled || false,
      notifTime: saved?.notifTime || "08:00",
    };
  };

  const [logs, setLogs]               = useState(()=>initState().logs);
  const [notifEnabled, setNotifEnabledState] = useState(()=>initState().notifEnabled);
  const [notifTime, setNotifTimeState]= useState(()=>initState().notifTime);
  const [page, setPage]               = useState("home");
  const [reps, setReps]               = useState({pushups:0,pullups:0,situps:0,squats:0});
  const [toast, setToast]             = useState(null);

  // Persist to localStorage on changes
  useEffect(() => {
    saveData({ logs, notifEnabled, notifTime });
  }, [logs, notifEnabled, notifTime]);

  const streak      = useMemo(()=>calcStreak(logs),[logs]);
  const totalXP     = useMemo(()=>calcTotalXP(logs),[logs]);
  const lvl         = useMemo(()=>calcLevel(totalXP),[totalXP]);
  const prs         = useMemo(()=>calcPRs(logs),[logs]);
  const todayLogged = useMemo(()=>logs.some(l=>l.date===todayStr()),[logs]);
  const unlockedIds = useMemo(()=>new Set(ACHS.filter(a=>a.check(logs,streak)).map(a=>a.id)),[logs,streak]);

  const showToast = useCallback((msg, type="success") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 3600);
  }, []);

  const handleLog = useCallback(() => {
    if (!Object.values(reps).some(v=>v>0)) return;
    let xp = 100;
    const newPRs = [];
    EXES.forEach(ex => { if(reps[ex.id]>prs[ex.id]){xp+=30;newPRs.push(ex.short);} });
    if (streak > 0) xp += 25;
    const entry = { date:todayStr(), ...reps, xp };
    setLogs(prev => [...prev.filter(l=>l.date!==todayStr()), entry].sort((a,b)=>a.date.localeCompare(b.date)));
    const msg = newPRs.length ? `+${xp} XP! New PRs: ${newPRs.join(",")}` : `+${xp} XP earned! Keep going!`;
    showToast(msg);
    setReps({pushups:0,pullups:0,situps:0,squats:0});
    setPage("home");
  }, [reps, prs, streak, showToast]);

  const handleReset = () => {
    if (window.confirm("Reset all your data? This cannot be undone.")) {
      setLogs([]);
      showToast("Data reset.", "error");
    }
  };

  const setNotifEnabled = (v) => { setNotifEnabledState(v); };
  const setNotifTime    = (v) => { setNotifTimeState(v); };

  const TITLES = { home:"RepMax", log:"Log Workout", prog:"Progress", ach:"Achievements", set:"Settings" };

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#060C1A",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif"}}>
      <div className="phone-wrap" style={{
        width:390,height:844,background:C.bg,borderRadius:44,overflow:"hidden",
        position:"relative",boxShadow:"0 36px 90px rgba(0,0,0,0.9)",border:`2px solid ${C.border}`,
      }}>
        {/* Status bar */}
        <div style={{height:52,background:C.bg,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 22px 0",flexShrink:0,zIndex:10,position:"relative"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>9:41</div>
          <div style={{fontSize:16,fontWeight:900,color:C.text,letterSpacing:.5}}>{TITLES[page]}</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <Ic.Flame sz={14} c={streak>0?C.orange:C.muted}/>
            <span style={{fontSize:12,fontWeight:800,color:streak>0?C.orange:C.muted}}>{streak}</span>
          </div>
        </div>

        {/* Toast */}
        {toast && <Toast msg={toast.msg} type={toast.type}/>}

        {/* Page */}
        <div style={{position:"absolute",top:52,bottom:72,left:0,right:0,overflowY:"auto",paddingTop:14}}>
          {page==="home" && <HomePage logs={logs} streak={streak} level={lvl.level} xpInLevel={lvl.xpInLevel} xpNeeded={lvl.xpNeeded} totalXP={totalXP} prs={prs} todayLogged={todayLogged} setPage={setPage} unlockedIds={unlockedIds}/>}
          {page==="log"  && <LogPage reps={reps} setReps={setReps} onSubmit={handleLog} todayLogged={todayLogged} prs={prs}/>}
          {page==="prog" && <ProgressPage logs={logs} prs={prs}/>}
          {page==="ach"  && <AchievPage logs={logs} streak={streak} unlockedIds={unlockedIds} totalXP={totalXP} level={lvl.level} xpInLevel={lvl.xpInLevel} xpNeeded={lvl.xpNeeded}/>}
          {page==="set"  && <SettingsPage notifEnabled={notifEnabled} setNotifEnabled={setNotifEnabled} notifTime={notifTime} setNotifTime={setNotifTime} onReset={handleReset}/>}
        </div>

        {/* Bottom Nav */}
        <div style={{position:"absolute",bottom:0,left:0,right:0}}>
          <BottomNav page={page} setPage={setPage}/>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
