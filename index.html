<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7f1d1d" />
  <meta name="description" content="RepMax web app for daily workout logging, friends, and leaderboard tracking." />
  <title>RepMax Website</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #130505 0%, #1f0909 100%);
      color: #fee2e2;
      min-height: 100vh;
    }
    button, input, select { font: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .card {
      background: #2a0f0f;
      border: 1px solid #7f1d1d;
      border-radius: 14px;
      padding: 16px;
    }
    .btn {
      border: 1px solid #991b1b;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.secondary { background: #3b1414; }
    .field {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #7f1d1d;
      background: #140909;
      color: #fee2e2;
    }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .muted { color: #fca5a5; font-size: 14px; }
    .nav {
      display: flex;
      gap: 8px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    .nav button {
      border: 1px solid #7f1d1d;
      background: #220c0c;
      color: #fecaca;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .nav button.active {
      background: #dc2626;
      color: #fff;
      border-color: #ef4444;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #7f1d1d; }
    th { color: #fca5a5; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    h1, h2, h3 { color: #fff; }
    .toast {
      position: fixed;
      top: 16px;
      right: 16px;
      background: #dc2626;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;
    const API_URL = window.REPMAX_API_URL || "http://localhost:5000/api";
    const EXES = ["pushups", "pullups", "situps", "squats"];

    const tokenKey = "repmax_auth";
    const getToken = () => localStorage.getItem(tokenKey);
    const setToken = token => localStorage.setItem(tokenKey, token);
    const clearToken = () => localStorage.removeItem(tokenKey);

    function todayStr() { return new Date().toISOString().split("T")[0]; }

    async function api(path, method = "GET", body) {
      const token = getToken();
      const res = await fetch(`${API_URL}${path}`, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        ...(body ? { body: JSON.stringify(body) } : {}),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.msg || "Request failed");
      return data;
    }

    function AuthPage({ onAuth, toast }) {
      const [mode, setMode] = useState("login");
      const [identity, setIdentity] = useState("");
      const [username, setUsername] = useState("");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [passwordConfirm, setPasswordConfirm] = useState("");
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        setLoading(true);
        try {
          if (mode === "signup") {
            const data = await api("/auth/signup", "POST", { username, email, password, passwordConfirm });
            setToken(data.token);
            onAuth(data.user);
            toast("Account created successfully");
          } else {
            const data = await api("/auth/login", "POST", { identity, password });
            setToken(data.token);
            onAuth(data.user);
            toast("Welcome back");
          }
        } catch (err) {
          toast(err.message, true);
        }
        setLoading(false);
      };

      return (
        <div className="container" style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div className="card" style={{ width: "100%", maxWidth: 480 }}>
            <h1 style={{ marginBottom: 8 }}>RepMax Website</h1>
            <p className="muted" style={{ marginBottom: 16 }}>Web-first experience for tracking reps, friends, and rankings.</p>

            <div className="nav" style={{ marginTop: 0 }}>
              <button className={mode === "login" ? "active" : ""} onClick={() => setMode("login")}>Sign In</button>
              <button className={mode === "signup" ? "active" : ""} onClick={() => setMode("signup")}>Create Account</button>
            </div>

            {mode === "signup" ? (
              <div style={{ display: "grid", gap: 10 }}>
                <input className="field" placeholder="Username" value={username} onChange={e => setUsername(e.target.value)} />
                <input className="field" placeholder="Email (optional)" value={email} onChange={e => setEmail(e.target.value)} />
                <input className="field" placeholder="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} />
                <input className="field" placeholder="Confirm password" type="password" value={passwordConfirm} onChange={e => setPasswordConfirm(e.target.value)} />
              </div>
            ) : (
              <div style={{ display: "grid", gap: 10 }}>
                <input className="field" placeholder="Username or email" value={identity} onChange={e => setIdentity(e.target.value)} />
                <input className="field" placeholder="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} />
              </div>
            )}

            <button className="btn" style={{ width: "100%", marginTop: 14 }} disabled={loading} onClick={submit}>
              {loading ? "Please wait..." : mode === "signup" ? "Create Account" : "Sign In"}
            </button>
          </div>
        </div>
      );
    }

    function DailyLog({ logs, onLogged, toast }) {
      const existing = logs.find(l => l.date === todayStr());
      const [form, setForm] = useState(existing || { date: todayStr(), pushups: 0, pullups: 0, situps: 0, squats: 0 });

      useEffect(() => {
        const now = logs.find(l => l.date === todayStr());
        setForm(now || { date: todayStr(), pushups: 0, pullups: 0, situps: 0, squats: 0 });
      }, [logs]);

      const save = async () => {
        try {
          const payload = { ...form, pushups: Number(form.pushups) || 0, pullups: Number(form.pullups) || 0, situps: Number(form.situps) || 0, squats: Number(form.squats) || 0 };
          await api("/workouts/log", "POST", payload);
          onLogged(payload);
          toast("Daily log saved");
        } catch (err) {
          toast(err.message, true);
        }
      };

      return (
        <div className="card">
          <h2>Daily Entry</h2>
          <p className="muted" style={{ marginBottom: 12 }}>Simple form for {todayStr()}.</p>
          <div className="grid-2">
            {EXES.map(ex => (
              <label key={ex} style={{ display: "grid", gap: 6 }}>
                <span style={{ textTransform: "capitalize", fontWeight: 600 }}>{ex}</span>
                <input className="field" type="number" min="0" value={form[ex]} onChange={e => setForm({ ...form, [ex]: e.target.value })} />
              </label>
            ))}
          </div>
          <button className="btn" style={{ marginTop: 12 }} onClick={save}>Save Today's Data</button>
        </div>
      );
    }

    function Dashboard({ logs, onLogged, toast }) {
      const totalReps = logs.reduce((sum, l) => sum + EXES.reduce((s, ex) => s + (l[ex] || 0), 0), 0);
      const maxes = useMemo(() => {
        const m = { pushups: 0, pullups: 0, situps: 0, squats: 0 };
        logs.forEach(l => EXES.forEach(ex => { m[ex] = Math.max(m[ex], l[ex] || 0); }));
        return m;
      }, [logs]);

      return (
        <div style={{ display: "grid", gap: 14 }}>
          <div className="grid-3">
            <div className="card"><h3>Total Workout Days</h3><div style={{ fontSize: 28, fontWeight: 800 }}>{logs.length}</div></div>
            <div className="card"><h3>Total Reps</h3><div style={{ fontSize: 28, fontWeight: 800 }}>{totalReps}</div></div>
            <div className="card"><h3>Best Pushups</h3><div style={{ fontSize: 28, fontWeight: 800 }}>{maxes.pushups}</div></div>
          </div>

          <DailyLog logs={logs} onLogged={onLogged} toast={toast} />

          <div className="card">
            <h2>Recent Entries</h2>
            <table style={{ marginTop: 10 }}>
              <thead>
                <tr><th>Date</th><th>Pushups</th><th>Pullups</th><th>Situps</th><th>Squats</th><th>Total</th></tr>
              </thead>
              <tbody>
                {[...logs].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 14).map((l, i) => (
                  <tr key={i}>
                    <td>{l.date}</td>
                    <td>{l.pushups || 0}</td>
                    <td>{l.pullups || 0}</td>
                    <td>{l.situps || 0}</td>
                    <td>{l.squats || 0}</td>
                    <td>{EXES.reduce((s, ex) => s + (l[ex] || 0), 0)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function FriendsPage({ toast }) {
      const [q, setQ] = useState("");
      const [results, setResults] = useState([]);
      const [requests, setRequests] = useState([]);
      const [friends, setFriends] = useState([]);

      const refresh = async () => {
        try {
          const [reqs, fs] = await Promise.all([api("/auth/friends/requests"), api("/auth/friends")]);
          setRequests(reqs);
          setFriends(fs);
        } catch (err) {
          toast(err.message, true);
        }
      };

      useEffect(() => { refresh(); }, []);

      const search = async () => {
        try {
          const data = await api(`/auth/users/search?q=${encodeURIComponent(q)}`);
          setResults(data);
        } catch (err) {
          toast(err.message, true);
        }
      };

      const sendRequest = async username => {
        try {
          await api("/auth/friends/request", "POST", { toUsername: username });
          toast(`Request sent to @${username}`);
          search();
        } catch (err) {
          toast(err.message, true);
        }
      };

      const respond = async (requestId, action) => {
        try {
          await api(`/auth/friends/request/${requestId}/respond`, "POST", { action });
          toast(`Request ${action}ed`);
          refresh();
        } catch (err) {
          toast(err.message, true);
        }
      };

      return (
        <div style={{ display: "grid", gap: 14 }}>
          <div className="card">
            <h2>Find Users</h2>
            <p className="muted" style={{ marginBottom: 10 }}>Search by username and send friend requests.</p>
            <div style={{ display: "flex", gap: 8 }}>
              <input className="field" placeholder="Search username" value={q} onChange={e => setQ(e.target.value)} />
              <button className="btn" onClick={search}>Search</button>
            </div>
            <div style={{ marginTop: 12, display: "grid", gap: 8 }}>
              {results.map(r => (
                <div key={r.id} className="card" style={{ padding: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>@{r.username}</div>
                    {r.alreadyFriends ? <span className="muted">Friends</span> : r.outgoingPending ? <span className="muted">Pending</span> : <button className="btn" onClick={() => sendRequest(r.username)}>Add Friend</button>}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="grid-2">
            <div className="card">
              <h3>Incoming Requests</h3>
              <div style={{ display: "grid", gap: 8, marginTop: 10 }}>
                {requests.map(r => (
                  <div key={r.requestId} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                    <span>@{r.fromUsername}</span>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button className="btn" onClick={() => respond(r.requestId, "accept")}>Accept</button>
                      <button className="btn secondary" onClick={() => respond(r.requestId, "reject")}>Reject</button>
                    </div>
                  </div>
                ))}
                {!requests.length && <p className="muted">No incoming requests.</p>}
              </div>
            </div>

            <div className="card">
              <h3>Your Friends</h3>
              <div style={{ marginTop: 10, display: "grid", gap: 6 }}>
                {friends.map(f => <div key={f.id}>@{f.username}</div>)}
                {!friends.length && <p className="muted">No friends added yet.</p>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function LeaderboardPage({ toast }) {
      const [boards, setBoards] = useState(null);
      useEffect(() => {
        api("/auth/leaderboard").then(setBoards).catch(err => toast(err.message, true));
      }, []);

      const Section = ({ title, data, value }) => (
        <div className="card">
          <h3>{title}</h3>
          <table style={{ marginTop: 10 }}>
            <thead><tr><th>#</th><th>User</th><th>Score</th></tr></thead>
            <tbody>
              {(data || []).slice(0, 10).map((row, idx) => (
                <tr key={`${row.username}-${idx}`}>
                  <td>{idx + 1}</td>
                  <td>@{row.username}</td>
                  <td>{value(row)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );

      if (!boards) return <div className="card">Loading leaderboards...</div>;

      return (
        <div style={{ display: "grid", gap: 12 }}>
          <div className="grid-2">
            <Section title="Most Progress" data={boards.progress} value={r => `${r.progressScore} pts`} />
            <Section title="Most Total Reps" data={boards.totalReps} value={r => r.totalReps} />
          </div>
          <div className="grid-2">
            <Section title="Longest Streak" data={boards.streaks} value={r => `${r.maxStreak} days`} />
            <Section title="Max Pushups" data={boards.maxPushups} value={r => r.prs.pushups} />
          </div>
          <div className="grid-3">
            <Section title="Max Pullups" data={boards.maxPullups} value={r => r.prs.pullups} />
            <Section title="Max Situps" data={boards.maxSitups} value={r => r.prs.situps} />
            <Section title="Max Squats" data={boards.maxSquats} value={r => r.prs.squats} />
          </div>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      const [logs, setLogs] = useState([]);
      const [page, setPage] = useState("dashboard");
      const [toastState, setToastState] = useState(null);

      const toast = (msg, isError = false) => {
        setToastState({ msg, isError });
        setTimeout(() => setToastState(null), 2800);
      };

      const syncProfile = async () => {
        try {
          const data = await api("/auth/profile");
          setUser({ username: data.username, email: data.email || "" });
          setLogs(data.logs || []);
        } catch {
          clearToken();
          setUser(null);
        }
      };

      useEffect(() => { if (getToken()) syncProfile(); }, []);

      const handleLogged = entry => {
        setLogs(prev => {
          const next = [...prev.filter(l => l.date !== entry.date), entry];
          return next.sort((a,b) => a.date.localeCompare(b.date));
        });
      };

      const logout = () => {
        clearToken();
        setUser(null);
        setLogs([]);
      };

      if (!user) return <AuthPage onAuth={() => syncProfile()} toast={toast} />;

      return (
        <div className="container">
          {toastState && <div className="toast" style={{ background: toastState.isError ? "#b91c1c" : "#dc2626" }}>{toastState.msg}</div>}

          <header className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <h1>RepMax</h1>
              <p className="muted">Welcome @{user.username}. Full website mode enabled.</p>
            </div>
            <button className="btn secondary" onClick={logout}>Sign Out</button>
          </header>

          <div className="nav">
            <button className={page === "dashboard" ? "active" : ""} onClick={() => setPage("dashboard")}>Dashboard</button>
            <button className={page === "friends" ? "active" : ""} onClick={() => setPage("friends")}>Friends</button>
            <button className={page === "leaderboard" ? "active" : ""} onClick={() => setPage("leaderboard")}>Leaderboard</button>
          </div>

          {page === "dashboard" && <Dashboard logs={logs} onLogged={handleLogged} toast={toast} />}
          {page === "friends" && <FriendsPage toast={toast} />}
          {page === "leaderboard" && <LeaderboardPage toast={toast} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
