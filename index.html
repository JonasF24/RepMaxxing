<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0F1E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="RepMaxxing — Track your bodyweight max reps, earn achievements, level up!" />
  <title>RepMaxxing 💪</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #060C1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    button { font-family: inherit; }
    input { font-family: inherit; }
    button:active { transform: scale(0.96); transition: transform 0.1s; }
    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 12px rgba(34,197,94,0.35); }
      50%       { box-shadow: 0 0 28px rgba(34,197,94,0.65); }
    }
    .xp-bar-fill { transition: width 1s cubic-bezier(.4,0,.2,1); }
    .achieve-progress-fill { transition: width 1s cubic-bezier(.4,0,.2,1); }
    @media (max-width: 430px) {
      .phone-wrap {
        width: 100vw !important; height: 100svh !important;
        border-radius: 0 !important; border: none !important;
        box-shadow: none !important;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;
const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

// ─── Config ───────────────────────────────────────────────────────────────────
const API_URL = window.REPMAX_API_URL || 'http://localhost:5000/api';

// ─── Design Tokens ────────────────────────────────────────────────────────────
const C = {
  bg: "#0A0F1E", surf: "#0F1929", surf2: "#131E2E", surf3: "#1A2640",
  border: "#1E3050", green: "#22C55E", cyan: "#06B6D4",
  orange: "#F97316", purple: "#A855F7", blue: "#3B82F6",
  text: "#F1F5F9", muted: "#64748B", mutedLight: "#94A3B8",
  gold: "#EAB308", danger: "#EF4444",
};

// ─── Storage Helpers ──────────────────────────────────────────────────────────
const LS_TOKEN = "repmax_auth";
const LS_LOGS  = "repmax_logs";
const saveToken = (t) => localStorage.setItem(LS_TOKEN, t);
const getToken  = ()  => localStorage.getItem(LS_TOKEN);
const clearToken = () => localStorage.removeItem(LS_TOKEN);
const saveLogs  = (l) => localStorage.setItem(LS_LOGS, JSON.stringify(l));
const getLogs   = ()  => { try { return JSON.parse(localStorage.getItem(LS_LOGS) || "[]"); } catch { return []; } };

// ─── Domain Constants ─────────────────────────────────────────────────────────
const EXES = [
  { id: "pushups", label: "Push-Ups", icon: "💪", color: C.green  },
  { id: "pullups", label: "Pull-Ups", icon: "🏋️", color: C.blue   },
  { id: "situps",  label: "Sit-Ups",  icon: "🔥", color: C.orange },
  { id: "squats",  label: "Squats",   icon: "⚡", color: C.purple },
];

const LEVELS = [
  { level: 1,  min: 0,     max: 200,    title: "Rookie",       emoji: "🌱" },
  { level: 2,  min: 200,   max: 500,    title: "Beginner",     emoji: "💪" },
  { level: 3,  min: 500,   max: 1000,   title: "Intermediate", emoji: "🔥" },
  { level: 4,  min: 1000,  max: 2000,   title: "Advanced",     emoji: "⚡" },
  { level: 5,  min: 2000,  max: 3500,   title: "Expert",       emoji: "🏆" },
  { level: 6,  min: 3500,  max: 6000,   title: "Pro",          emoji: "⭐" },
  { level: 7,  min: 6000,  max: 10000,  title: "Elite",        emoji: "💎" },
  { level: 8,  min: 10000, max: 16000,  title: "Master",       emoji: "👑" },
  { level: 9,  min: 16000, max: 25000,  title: "Champion",     emoji: "🌟" },
  { level: 10, min: 25000, max: Infinity, title: "Legend",     emoji: "🐐" },
];

const ACHIEVEMENTS = [
  { id: "first_rep",    emoji: "🎯", title: "First Rep",       desc: "Log your first workout",             check: (s) => s.totalWorkouts >= 1 },
  { id: "streak_3",     emoji: "🔥", title: "On Fire",         desc: "Achieve a 3-day streak",             check: (s) => s.maxStreak >= 3 },
  { id: "streak_7",     emoji: "⚡", title: "Unstoppable",     desc: "Achieve a 7-day streak",             check: (s) => s.maxStreak >= 7 },
  { id: "streak_30",    emoji: "🏆", title: "Iron Discipline", desc: "Achieve a 30-day streak",            check: (s) => s.maxStreak >= 30 },
  { id: "workouts_10",  emoji: "💯", title: "Consistent",      desc: "Log 10 workouts",                    check: (s) => s.totalWorkouts >= 10 },
  { id: "workouts_30",  emoji: "📈", title: "Dedicated",       desc: "Log 30 workouts",                    check: (s) => s.totalWorkouts >= 30 },
  { id: "workouts_100", emoji: "🏅", title: "Centurion",       desc: "Log 100 workouts",                   check: (s) => s.totalWorkouts >= 100 },
  { id: "pushups_50",   emoji: "💪", title: "Push King",       desc: "50+ push-ups in one session",        check: (s) => s.prs.pushups >= 50 },
  { id: "pullups_20",   emoji: "🏋️", title: "Pull Master",     desc: "20+ pull-ups in one session",        check: (s) => s.prs.pullups >= 20 },
  { id: "situps_50",    emoji: "🔥", title: "Core Master",     desc: "50+ sit-ups in one session",         check: (s) => s.prs.situps >= 50 },
  { id: "squats_50",    emoji: "⚡", title: "Leg Day Hero",    desc: "50+ squats in one session",          check: (s) => s.prs.squats >= 50 },
  { id: "all_rounder",  emoji: "🌟", title: "All-Rounder",     desc: "Hit all 4 exercises in one session", check: (s) => s.hasAllRounder },
  { id: "level_5",      emoji: "⭐", title: "Level 5",         desc: "Reach Level 5",                      check: (s) => s.level >= 5 },
  { id: "level_10",     emoji: "🐐", title: "Legend",          desc: "Reach Level 10",                     check: (s) => s.level >= 10 },
  { id: "pr_machine",   emoji: "📊", title: "PR Machine",      desc: "Set 5 personal records",             check: (s) => s.totalPRs >= 5 },
];

// ─── Helpers ──────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];

function calcPRs(logs) {
  const prs = { pushups: 0, pullups: 0, situps: 0, squats: 0 };
  logs.forEach(log => EXES.forEach(ex => { if ((log[ex.id] || 0) > prs[ex.id]) prs[ex.id] = log[ex.id]; }));
  return prs;
}

function uniqueDates(logs) {
  return [...new Set(logs.map(l => l.date))].sort();
}

function calcCurrentStreak(logs) {
  const dates = uniqueDates(logs);
  if (!dates.length) return 0;
  const today = todayStr();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yesterdayStr = yest.toISOString().split("T")[0];
  const last = dates[dates.length - 1];
  if (last !== today && last !== yesterdayStr) return 0;
  let streak = 1;
  for (let i = dates.length - 2; i >= 0; i--) {
    const diff = (new Date(dates[i + 1]) - new Date(dates[i])) / 86400000;
    if (diff === 1) streak++; else break;
  }
  return streak;
}

function calcMaxStreak(logs) {
  const dates = uniqueDates(logs);
  if (!dates.length) return 0;
  let max = 1, cur = 1;
  for (let i = 1; i < dates.length; i++) {
    const diff = (new Date(dates[i]) - new Date(dates[i - 1])) / 86400000;
    if (diff === 1) { cur++; if (cur > max) max = cur; } else cur = 1;
  }
  return max;
}

function calcXP(logs) {
  const byDate = {};
  logs.forEach(log => {
    if (!byDate[log.date]) { byDate[log.date] = log; return; }
    const curr = EXES.reduce((s, ex) => s + (log[ex.id] || 0), 0);
    const prev = EXES.reduce((s, ex) => s + (byDate[log.date][ex.id] || 0), 0);
    if (curr > prev) byDate[log.date] = log;
  });
  const sorted = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));
  let xp = 0, streak = 0, prevDate = null;
  const runPRs = { pushups: 0, pullups: 0, situps: 0, squats: 0 };
  sorted.forEach(log => {
    xp += 50;
    EXES.forEach(ex => { if ((log[ex.id] || 0) > runPRs[ex.id]) { xp += 100; runPRs[ex.id] = log[ex.id]; } });
    if (prevDate) {
      const diff = (new Date(log.date) - new Date(prevDate)) / 86400000;
      if (diff === 1) { streak++; xp += Math.min(streak * 5, 50); } else streak = 1;
    } else { streak = 1; }
    prevDate = log.date;
  });
  return xp;
}

function getLevelInfo(xp) {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) {
      const lv = LEVELS[i], next = LEVELS[i + 1];
      const progress = next ? (xp - lv.min) / (next.min - lv.min) : 1;
      return { ...lv, progress, xpNeeded: next ? next.min - xp : 0, xp };
    }
  }
  return { ...LEVELS[0], progress: 0, xpNeeded: LEVELS[1].min, xp };
}

function calcAllStats(logs) {
  const xp = calcXP(logs);
  const levelInfo = getLevelInfo(xp);
  const prs = calcPRs(logs);
  const currentStreak = calcCurrentStreak(logs);
  const maxStreak = calcMaxStreak(logs);
  let totalPRs = 0;
  const sorted = [...logs].sort((a, b) => a.date.localeCompare(b.date));
  const rPRs = { pushups: 0, pullups: 0, situps: 0, squats: 0 };
  sorted.forEach(log => EXES.forEach(ex => { if ((log[ex.id] || 0) > rPRs[ex.id]) { totalPRs++; rPRs[ex.id] = log[ex.id]; } }));
  const hasAllRounder = logs.some(log => EXES.every(ex => (log[ex.id] || 0) > 0));
  return { xp, level: levelInfo.level, levelInfo, prs, currentStreak, maxStreak, totalWorkouts: uniqueDates(logs).length, totalPRs, hasAllRounder };
}

// ─── Shared UI Components ─────────────────────────────────────────────────────

function Toast({ msg, type }) {
  if (!msg) return null;
  const map = { success: { bg: C.green, icon: "✓" }, error: { bg: C.danger, icon: "✕" }, info: { bg: C.blue, icon: "ℹ" } };
  const { bg, icon } = map[type] || map.info;
  return (
    <div style={{
      position: "absolute", top: 16, left: 12, right: 12, zIndex: 999,
      background: bg, borderRadius: 14, padding: "13px 16px",
      color: "#fff", fontWeight: 700, fontSize: 14, textAlign: "center",
      boxShadow: `0 6px 28px ${bg}66`, animation: "slideDown 0.3s ease",
      display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
    }}>
      <span style={{ fontSize: 16 }}>{icon}</span> {msg}
    </div>
  );
}

function XPBar({ levelInfo }) {
  const pct = Math.round(levelInfo.progress * 100);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 13, fontWeight: 800, color: C.green }}>
          {levelInfo.emoji} Lvl {levelInfo.level} · {levelInfo.title}
        </span>
        <span style={{ fontSize: 11, color: C.muted }}>
          {levelInfo.level < 10 ? `${levelInfo.xpNeeded} XP to next` : "MAX LEVEL"}
        </span>
      </div>
      <div style={{ height: 8, borderRadius: 4, background: C.surf3, overflow: "hidden" }}>
        <div className="xp-bar-fill" style={{
          height: "100%", width: `${pct}%`, borderRadius: 4,
          background: `linear-gradient(90deg, ${C.green}, ${C.cyan})`,
          boxShadow: `0 0 8px ${C.green}88`,
        }} />
      </div>
      <div style={{ fontSize: 11, color: C.muted, textAlign: "center" }}>
        {levelInfo.xp.toLocaleString()} XP total · {pct}% to Level {Math.min(levelInfo.level + 1, 10)}
      </div>
    </div>
  );
}

function StatCard({ label, value, sub, color, icon }) {
  return (
    <div style={{
      background: C.surf, borderRadius: 16, padding: "14px 12px",
      border: `1px solid ${C.border}`, display: "flex", flexDirection: "column", gap: 4,
    }}>
      <div style={{ fontSize: 10, color: C.muted, fontWeight: 700, display: "flex", alignItems: "center", gap: 4, letterSpacing: 0.3 }}>
        {icon} {label}
      </div>
      <div style={{ fontSize: 26, fontWeight: 900, color: color || C.green, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ fontSize: 10, color: C.muted }}>{sub}</div>}
    </div>
  );
}

// ─── Auth Page ────────────────────────────────────────────────────────────────

function AuthPage({ setAuthState, showToast }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [phone, setPhone] = useState("");
  const [password, setPassword] = useState("");
  const [passwordConfirm, setPasswordConfirm] = useState("");
  const [code, setCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [step, setStep] = useState("credentials");
  const [showPw, setShowPw] = useState(false);

  const iStyle = {
    background: C.surf2, border: `1px solid ${C.border}`, borderRadius: 14,
    padding: "14px 16px", color: C.text, fontSize: 15, outline: "none", width: "100%",
  };

  const post = async (path, body) => {
    const res = await fetch(`${API_URL}/auth/${path}`, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
    return { res, data: await res.json() };
  };

  const handleSignup = async () => {
    if (!email && !phone) { showToast("Enter email or phone", "error"); return; }
    if (password.length < 8) { showToast("Password must be 8+ characters", "error"); return; }
    if (password !== passwordConfirm) { showToast("Passwords don't match", "error"); return; }
    setLoading(true);
    try {
      const { res, data } = await post("signup", { email, phone, password, passwordConfirm });
      if (res.ok) { setStep("verify"); showToast("Check your email/phone for the code", "success"); }
      else showToast(data.msg || "Signup failed", "error");
    } catch { showToast("Cannot connect to server", "error"); }
    setLoading(false);
  };

  const handleVerify = async () => {
    if (!code) { showToast("Enter the code", "error"); return; }
    setLoading(true);
    try {
      const { res, data } = await post("verify", { email: email || undefined, phone: phone || undefined, code });
      if (res.ok) { saveToken(data.token); setAuthState(true); showToast("Welcome! Let's get maxing 💪", "success"); }
      else showToast(data.msg || "Invalid code", "error");
    } catch { showToast("Error verifying", "error"); }
    setLoading(false);
  };

  const handleLogin = async () => {
    if (!email && !phone) { showToast("Enter email or phone", "error"); return; }
    if (!password) { showToast("Enter your password", "error"); return; }
    setLoading(true);
    try {
      const { res, data } = await post("login", { email: email || undefined, phone: phone || undefined, password });
      if (res.ok) { saveToken(data.token); setAuthState(true); showToast("Back at it! 💪", "success"); }
      else showToast(data.msg || "Login failed", "error");
    } catch { showToast("Connection error", "error"); }
    setLoading(false);
  };

  return (
    <div style={{
      width: "100%", height: "100%", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center", background: C.bg, padding: "24px", overflowY: "auto",
    }}>
      <div style={{ marginBottom: 28, textAlign: "center" }}>
        <div style={{ fontSize: 56, marginBottom: 8 }}>💪</div>
        <h1 style={{
          fontSize: 34, fontWeight: 900,
          background: `linear-gradient(135deg, ${C.green}, ${C.cyan})`,
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}>RepMaxxing</h1>
        <p style={{ color: C.muted, fontSize: 14, marginTop: 6 }}>Track. Level Up. Conquer.</p>
      </div>

      <div style={{
        width: "100%", maxWidth: 400, background: C.surf, borderRadius: 24,
        padding: "24px 20px", border: `1px solid ${C.border}`,
        display: "flex", flexDirection: "column", gap: 14,
      }}>
        {/* Mode toggle */}
        <div style={{ display: "flex", gap: 6, background: C.surf2, borderRadius: 12, padding: 4 }}>
          {["login", "signup"].map(m => (
            <button key={m} onClick={() => { setMode(m); setStep("credentials"); }} style={{
              flex: 1, border: "none", borderRadius: 10, padding: "10px",
              background: mode === m ? C.green : "transparent",
              color: mode === m ? "#000" : C.muted, fontWeight: 800, cursor: "pointer", fontSize: 14,
            }}>
              {m === "login" ? "Sign In" : "Create Account"}
            </button>
          ))}
        </div>

        {step === "credentials" && <>
          <input type="text" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)}
            onKeyDown={e => e.key === "Enter" && (mode === "login" ? handleLogin() : handleSignup())} style={iStyle} />
          {mode === "signup" && (
            <input type="tel" placeholder="Phone number (optional)" value={phone}
              onChange={e => setPhone(e.target.value)} style={iStyle} />
          )}
          <div style={{ position: "relative" }}>
            <input type={showPw ? "text" : "password"} placeholder="Password" value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === "Enter" && (mode === "login" ? handleLogin() : handleSignup())}
              style={{ ...iStyle, paddingRight: 48 }} />
            <button onClick={() => setShowPw(p => !p)} style={{
              position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)",
              background: "none", border: "none", color: C.muted, fontSize: 18, cursor: "pointer",
            }}>{showPw ? "🙈" : "👁️"}</button>
          </div>
          {mode === "signup" && (
            <input type={showPw ? "text" : "password"} placeholder="Confirm password" value={passwordConfirm}
              onChange={e => setPasswordConfirm(e.target.value)} style={iStyle} />
          )}
          <button onClick={mode === "login" ? handleLogin : handleSignup} disabled={loading} style={{
            border: "none", borderRadius: 14, padding: "16px", fontSize: 16, fontWeight: 800, width: "100%",
            background: C.green, color: "#000", cursor: loading ? "not-allowed" : "pointer", opacity: loading ? 0.6 : 1,
          }}>
            {loading ? "Loading…" : mode === "login" ? "Sign In" : "Create Account"}
          </button>
        </>}

        {step === "verify" && <>
          <div style={{
            textAlign: "center", padding: 16, background: `${C.blue}11`,
            borderRadius: 12, border: `1px solid ${C.blue}33`,
          }}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>📬</div>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>Check your {email ? "email" : "phone"}</div>
            <div style={{ color: C.muted, fontSize: 12, marginTop: 4 }}>6-digit code sent to {email || phone}</div>
          </div>
          <input type="text" inputMode="numeric" placeholder="000000" value={code}
            onChange={e => setCode(e.target.value)} maxLength="6"
            style={{ ...iStyle, textAlign: "center", letterSpacing: 10, fontSize: 24, fontWeight: 900 }} />
          <button onClick={handleVerify} disabled={loading} style={{
            border: "none", borderRadius: 14, padding: "16px", fontSize: 16, fontWeight: 800, width: "100%",
            background: C.green, color: "#000", cursor: loading ? "not-allowed" : "pointer", opacity: loading ? 0.6 : 1,
          }}>
            {loading ? "Verifying…" : "Verify Code"}
          </button>
          <button onClick={() => setStep("credentials")} style={{
            border: `1px solid ${C.border}`, borderRadius: 14, padding: "12px", fontSize: 14,
            background: "none", color: C.mutedLight, cursor: "pointer", fontWeight: 600, width: "100%",
          }}>← Back</button>
        </>}
      </div>
    </div>
  );
}

// ─── Home Page ────────────────────────────────────────────────────────────────

function HomePage({ logs, stats, setPage }) {
  const todayLogged = logs.some(l => l.date === todayStr());
  const { levelInfo, currentStreak, prs } = stats;
  const recent = [...logs].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 3);

  return (
    <div style={{ padding: "0 16px 20px", display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Header card */}
      <div style={{
        background: `linear-gradient(135deg, ${C.surf2}, ${C.surf3})`,
        borderRadius: 22, padding: "20px", border: `1px solid ${C.border}`, position: "relative", overflow: "hidden",
      }}>
        <div style={{
          position: "absolute", top: -24, right: -24, width: 90, height: 90,
          borderRadius: "50%", background: `${C.green}18`,
        }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>
              {new Date().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}
            </div>
            <h2 style={{ fontSize: 20, fontWeight: 900, color: C.text, marginTop: 4 }}>
              {todayLogged ? "Crushed it today! 🔥" : "Ready to train? 💪"}
            </h2>
          </div>
          <div style={{
            background: `${C.green}22`, borderRadius: 14, padding: "8px 12px",
            textAlign: "center", border: `1px solid ${C.green}44`,
          }}>
            <div style={{ fontSize: 22 }}>{levelInfo.emoji}</div>
            <div style={{ fontSize: 10, color: C.green, fontWeight: 800, marginTop: 2 }}>Lvl {levelInfo.level}</div>
          </div>
        </div>

function LogPage({ logs, reps, setReps, onSubmit }) {
  const prs = calcPRs(logs);

  return (
    <div style={{ padding: "0 16px 20px", display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ textAlign: "center", marginBottom: 4 }}>

        <p style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>
          {new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}
        </p>
      </div>

      {EXES.map(ex => {
        const val = reps[ex.id];

              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 20 }}>{ex.icon}</span>
                <span style={{ fontSize: 16, fontWeight: 800, color: C.text }}>{ex.label}</span>
              </div>
              {isPR
                ? <span style={{ background: `${ex.color}22`, borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 800, color: ex.color, animation: "popIn 0.3s ease" }}>🏆 NEW PR!</span>
                : prs[ex.id] > 0

            </div>

                display: "flex", alignItems: "center", justifyContent: "center",
              }}>−</button>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontSize: 54, fontWeight: 900, color: val > 0 ? ex.color : C.muted, lineHeight: 1 }}>{val}</div>
                <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>reps</div>
              </div>
              <button onClick={() => setReps(r => ({ ...r, [ex.id]: r[ex.id] + 1 }))} style={{
                width: 52, height: 52, borderRadius: 16, border: "none",

                display: "flex", alignItems: "center", justifyContent: "center",

        background: canSubmit ? `linear-gradient(135deg, ${C.green}, ${C.cyan})` : C.surf2,
        color: canSubmit ? "#000" : C.muted, transition: "all 0.25s",
        boxShadow: canSubmit ? `0 8px 24px ${C.green}44` : "none",

        {canSubmit ? "💾 Save Workout" : "Enter at least one exercise"}
      </button>
    </div>
  );
}

// ─── Progress Page ────────────────────────────────────────────────────────────

function ProgressPage({ logs }) {
  const [selEx, setSelEx] = useState("pushups");
  const [range, setRange] = useState(30);
  const prs = calcPRs(logs);
  const ex = EXES.find(e => e.id === selEx);

  const chartData = useMemo(() => {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - range);
    const cutStr = cutoff.toISOString().split("T")[0];
    const byDate = {};
    logs.filter(l => l.date >= cutStr).forEach(log => {
      if (!byDate[log.date] || (log[selEx] || 0) > (byDate[log.date][selEx] || 0)) byDate[log.date] = log;
    });
    const result = [];
    for (let d = new Date(cutStr + "T12:00:00"); d.toISOString().split("T")[0] <= todayStr(); d.setDate(d.getDate() + 1)) {
      const ds = d.toISOString().split("T")[0];
      result.push({
        date: ds,
        label: new Date(ds + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }),
        value: byDate[ds] ? (byDate[ds][selEx] || null) : null,
      });
    }
    return result;
  }, [logs, selEx, range]);

  const heatmap = useMemo(() => {
    const logged = new Set(logs.map(l => l.date));
    const cells = [];
    for (let i = 89; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().split("T")[0];
      cells.push({ date: ds, logged: logged.has(ds) });
    }
    return cells;
  }, [logs]);

  const weeks = useMemo(() => {
    const w = [];
    for (let i = 0; i < heatmap.length; i += 7) w.push(heatmap.slice(i, i + 7));
    return w;
  }, [heatmap]);

  const hasData = chartData.some(d => d.value > 0);

  return (
    <div style={{ padding: "0 16px 20px", display: "flex", flexDirection: "column", gap: 14 }}>
      <h2 style={{ fontSize: 20, fontWeight: 900, color: C.text, textAlign: "center" }}>Progress</h2>

      {/* Exercise tabs */}
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 2 }}>
        {EXES.map(e => (
          <button key={e.id} onClick={() => setSelEx(e.id)} style={{
            flex: "0 0 auto", border: "none", borderRadius: 12, padding: "8px 14px", fontSize: 13, fontWeight: 700,
            background: selEx === e.id ? e.color : C.surf2, color: selEx === e.id ? "#000" : C.muted,
            cursor: "pointer", boxShadow: selEx === e.id ? `0 4px 12px ${e.color}44` : "none",
          }}>{e.icon} {e.label}</button>
        ))}
      </div>

      {/* Chart card */}
      <div style={{ background: C.surf, borderRadius: 20, padding: "16px", border: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, color: C.text }}>{ex.icon} {ex.label}</div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
              PR: <span style={{ color: ex.color, fontWeight: 700 }}>{prs[selEx]} reps</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 5 }}>
            {[7, 30, 90].map(r => (
              <button key={r} onClick={() => setRange(r)} style={{
                border: "none", borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer",
                background: range === r ? ex.color : C.surf3, color: range === r ? "#000" : C.muted,
              }}>{r}d</button>
            ))}
          </div>
        </div>
        {hasData ? (
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={chartData} margin={{ top: 5, right: 5, left: -20, bottom: 5 }}>
              <defs>
                <linearGradient id={`g-${selEx}`} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor={ex.color} stopOpacity={0.3} />
                  <stop offset="95%" stopColor={ex.color} stopOpacity={0} />
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false} />
              <XAxis dataKey="label" stroke={C.muted} tick={{ fill: C.muted, fontSize: 10 }} tickLine={false}
                interval={Math.floor(chartData.length / 4)} />
              <YAxis stroke={C.muted} tick={{ fill: C.muted, fontSize: 10 }} tickLine={false} />
              <Tooltip contentStyle={{ background: C.surf3, border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, fontSize: 12 }}
                cursor={{ stroke: ex.color, strokeWidth: 1.5, strokeDasharray: "4 4" }}
                formatter={v => [v ? `${v} reps` : "Rest", ""]} />
              <Area type="monotone" dataKey="value" stroke={ex.color} strokeWidth={2.5}
                fill={`url(#g-${selEx})`} dot={false} connectNulls={false} />
            </AreaChart>
          </ResponsiveContainer>
        ) : (
          <div style={{ height: 200, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8 }}>
            <div style={{ fontSize: 36 }}>📊</div>
            <div style={{ color: C.muted, fontSize: 13, fontWeight: 600 }}>No data for this period</div>
            <div style={{ color: C.muted, fontSize: 11 }}>Start logging to see your progress!</div>
          </div>
        )}
      </div>

      {/* Consistency heatmap */}
      <div style={{ background: C.surf, borderRadius: 20, padding: "16px", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 14, fontWeight: 800, color: C.text, marginBottom: 12 }}>📅 Consistency — Last 90 Days</div>
        <div style={{ display: "flex", gap: 3, flexWrap: "nowrap", overflowX: "auto" }}>
          {weeks.map((week, wi) => (
            <div key={wi} style={{ display: "flex", flexDirection: "column", gap: 3 }}>
              {week.map((day, di) => (
                <div key={di} title={day.date} style={{
                  width: 12, height: 12, borderRadius: 3,
                  background: day.logged ? C.green : C.surf3,
                  opacity: day.logged ? 1 : 0.45,
                  boxShadow: day.logged ? `0 0 5px ${C.green}55` : "none",
                }} />
              ))}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 10, alignItems: "center" }}>
          <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: C.surf3, opacity: 0.45 }} />
            <span style={{ fontSize: 10, color: C.muted }}>Rest</span>
          </div>
          <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: C.green }} />
            <span style={{ fontSize: 10, color: C.muted }}>Workout</span>
          </div>
          <span style={{ fontSize: 10, color: C.muted, marginLeft: "auto" }}>
            {[...new Set(logs.map(l => l.date))].length} days logged
          </span>
        </div>
      </div>

      {/* Per-exercise PR cards */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {EXES.map(e => (
          <div key={e.id} style={{ background: C.surf, borderRadius: 16, padding: "14px 16px", border: `1px solid ${C.border}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
              <span style={{ fontSize: 14 }}>{e.icon}</span>
              <span style={{ fontSize: 11, color: C.muted, fontWeight: 600 }}>{e.label}</span>
            </div>
            <div style={{ fontSize: 26, fontWeight: 900, color: e.color }}>
              {prs[e.id]} <span style={{ fontSize: 11, color: C.muted, fontWeight: 400 }}>PR</span>
            </div>
            <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>
              {logs.filter(l => (l[e.id] || 0) > 0).length} sessions
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AchievementsPage({ stats }) {
  const earned   = ACHIEVEMENTS.filter(a =>  a.check(stats));
  const unearned = ACHIEVEMENTS.filter(a => !a.check(stats));
  const pct = Math.round(earned.length / ACHIEVEMENTS.length * 100);

  const Card = ({ ach, unlocked }) => (
    <div style={{
      background: unlocked ? `${C.green}0D` : C.surf,
      borderRadius: 16, padding: "14px",
      border: `1.5px solid ${unlocked ? C.green + "44" : C.border}`,
      display: "flex", alignItems: "center", gap: 12,
      opacity: unlocked ? 1 : 0.55,
    }}>
      <div style={{
        fontSize: 26, width: 44, height: 44, background: unlocked ? `${C.green}22` : C.surf2,
        borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0, filter: unlocked ? "none" : "grayscale(1)",
      }}>{ach.emoji}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 800, color: unlocked ? C.text : C.muted }}>{ach.title}</div>
        <div style={{ fontSize: 11, color: C.muted, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
          {ach.desc}
        </div>
      </div>
      {unlocked && <div style={{ fontSize: 16, flexShrink: 0 }}>✅</div>}
    </div>
  );

  return (
    <div style={{ padding: "0 16px 20px", display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ textAlign: "center" }}>
        <h2 style={{ fontSize: 20, fontWeight: 900, color: C.text }}>Achievements</h2>
        <p style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>{earned.length} / {ACHIEVEMENTS.length} unlocked</p>

      {/* Progress bar */}
      <div style={{ background: C.surf, borderRadius: 14, padding: "14px", border: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.text }}>Collection Progress</span>
          <span style={{ fontSize: 13, fontWeight: 800, color: C.gold }}>{pct}%</span>
        </div>
        <div style={{ height: 8, borderRadius: 4, background: C.surf3, overflow: "hidden" }}>
          <div className="achieve-progress-fill" style={{
            height: "100%", borderRadius: 4, width: `${pct}%`,
            background: `linear-gradient(90deg, ${C.green}, ${C.gold})`,
          }} />
        </div>
      </div>

      {earned.length > 0 && (
        <div>
          <div style={{ fontSize: 11, color: C.gold, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>🏆 UNLOCKED ({earned.length})</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {earned.map(a => <Card key={a.id} ach={a} unlocked />)}
          </div>
        </div>
      )}

      {unearned.length > 0 && (
        <div>
          <div style={{ fontSize: 11, color: C.muted, fontWeight: 700, letterSpacing: 1, marginBottom: 10 }}>🔒 LOCKED ({unearned.length})</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {unearned.map(a => <Card key={a.id} ach={a} unlocked={false} />)}
          </div>
        </div>
      )}
    </div>
  );
}

        <button key={t.id} onClick={() => setPage(t.id)} style={{
          flex: 1, border: "none", background: "none", cursor: "pointer",
          padding: "10px 4px 10px", display: "flex", flexDirection: "column",
          alignItems: "center", gap: 3, color: page === t.id ? C.green : C.muted,
          position: "relative",
        }}>
          <span style={{ fontSize: 20, lineHeight: 1 }}>{t.icon}</span>
          <span style={{ fontSize: 10, fontWeight: page === t.id ? 800 : 500, letterSpacing: 0.3 }}>{t.label}</span>
          {page === t.id && (
            <div style={{
              position: "absolute", bottom: 0, left: "25%", right: "25%",
              height: 3, borderRadius: 2, background: C.green,
            }} />
          )}
        </button>
      ))}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  const [isAuth, setIsAuth] = useState(!!getToken());
  const [logs, setLogs] = useState(() => getLogs());
  const [page, setPage] = useState("home");
  const [reps, setReps] = useState({ pushups: 0, pullups: 0, situps: 0, squats: 0 });
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(false);
  const [user, setUser] = useState(null);

  const stats = useMemo(() => calcAllStats(logs), [logs]);

  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3200);
  }, []);

  useEffect(() => { if (isAuth) syncWithBackend(); }, [isAuth]);

  const syncWithBackend = async () => {
    const token = getToken();
    if (!token) return;
    setLoading(true);
    try {
      const res = await fetch(`${API_URL}/auth/profile`, { headers: { Authorization: `Bearer ${token}` } });
      if (res.ok) {
        const data = await res.json();
        setUser(data.username);
        if (data.logs && data.logs.length > 0) {
          const local = getLogs();
          const byDate = {};
          [...data.logs, ...local].forEach(log => {
            if (!byDate[log.date]) { byDate[log.date] = log; return; }
            const curr = EXES.reduce((s, ex) => s + (log[ex.id] || 0), 0);
            const prev = EXES.reduce((s, ex) => s + (byDate[log.date][ex.id] || 0), 0);
            if (curr > prev) byDate[log.date] = log;
          });
          const merged = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));
          setLogs(merged);
          saveLogs(merged);
        }
      } else {
        clearToken(); setIsAuth(false);
      }
    } catch { console.log("Backend unavailable — working offline"); }
    setLoading(false);
  };

  const handleLogout = () => {
    clearToken(); setIsAuth(false); setLogs([]); saveLogs([]); setPage("home");
    showToast("Logged out 👋");
  };

  const handleLog = async () => {
    if (!Object.values(reps).some(v => v > 0)) return;
    const entry = { date: todayStr(), ...reps };
    const newLogs = [...logs.filter(l => l.date !== todayStr()), entry];
    const prevStats = calcAllStats(logs);
    const nextStats = calcAllStats(newLogs);
    const prevIds = new Set(ACHIEVEMENTS.filter(a => a.check(prevStats)).map(a => a.id));
    const newAch = ACHIEVEMENTS.filter(a => a.check(nextStats) && !prevIds.has(a.id));

    setLogs(newLogs);
    saveLogs(newLogs);
    setReps({ pushups: 0, pullups: 0, situps: 0, squats: 0 });
    setPage("home");

    const xpGained = nextStats.xp - prevStats.xp;
    const newPRs = EXES.filter(ex => (entry[ex.id] || 0) > (prevStats.prs[ex.id] || 0) && (entry[ex.id] || 0) > 0);
    showToast(newPRs.length ? `New PR${newPRs.length > 1 ? "s" : ""}! 🏆 +${xpGained} XP` : `Workout logged! +${xpGained} XP 💪`);
    // Queue all newly unlocked achievement notifications sequentially
    newAch.forEach((ach, i) => setTimeout(() => showToast(`🏆 Achievement: ${ach.title}!`), 3400 + i * 3400));

    const token = getToken();
    if (token) {
      try {
        await fetch(`${API_URL}/workouts/log`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify(entry),
        });
      } catch { /* offline */ }
    }
  };

  if (!isAuth) {
    return (
      <div style={{ width: "100vw", height: "100vh", background: C.bg, position: "relative" }}>
        {toast && <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", zIndex: 9999, width: "90%", maxWidth: 400 }}>
          <Toast msg={toast.msg} type={toast.type} />
        </div>}
        <AuthPage setAuthState={setIsAuth} showToast={showToast} />
      </div>
    );
  }

  if (loading) {
    return (
      <div style={{ width: "100vw", height: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
        <div style={{ fontSize: 52 }}>💪</div>
        <div style={{ color: C.green, fontSize: 16, fontWeight: 700, animation: "pulse 1.5s infinite" }}>Loading your stats…</div>
      </div>
    );
  }

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#060C1A" }}>
      <div className="phone-wrap" style={{
        width: 390, height: 844, background: C.bg, borderRadius: 44, overflow: "hidden",
        position: "relative", boxShadow: "0 36px 90px rgba(0,0,0,0.9)", border: "1px solid #1a2a3a",
      }}>
        {toast && <Toast msg={toast.msg} type={toast.type} />}

        {/* Sticky header bar */}
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, zIndex: 50,
          padding: "14px 16px 10px",
          background: `linear-gradient(180deg, ${C.surf} 60%, transparent 100%)`,
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
              <span style={{ fontSize: 20 }}>💪</span>
              <span style={{ fontSize: 16, fontWeight: 900, color: C.text }}>RepMaxxing</span>
            </div>
            <div style={{
              display: "flex", alignItems: "center", gap: 5,
              background: stats.currentStreak > 0 ? `${C.orange}22` : C.surf2,
              borderRadius: 10, padding: "5px 10px",
              border: stats.currentStreak > 0 ? `1px solid ${C.orange}44` : `1px solid ${C.border}`,
            }}>
              <span style={{ fontSize: 14 }}>🔥</span>
              <span style={{ fontSize: 13, fontWeight: 800, color: stats.currentStreak > 0 ? C.orange : C.muted }}>
                {stats.currentStreak}
              </span>
            </div>
          </div>
        </div>

        {/* Scrollable page content */}
        <div style={{ position: "absolute", top: 0, bottom: 60, left: 0, right: 0, overflowY: "auto", paddingTop: 58 }}>
          {page === "home"         && <HomePage         logs={logs}  stats={stats} setPage={setPage} />}
          {page === "log"          && <LogPage          logs={logs}  reps={reps}   setReps={setReps} onSubmit={handleLog} />}
          {page === "progress"     && <ProgressPage     logs={logs} />}
          {page === "achievements" && <AchievementsPage stats={stats} />}
          {page === "profile"      && <ProfilePage      logs={logs}  stats={stats} user={user} onLogout={handleLogout} />}
        </div>

        <NavBar page={page} setPage={setPage} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
