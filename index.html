<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0F1E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Track your bodyweight max reps with backend authentication" />
  <title>RepMax Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #060C1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    button { font-family: inherit; }
    input { font-family: inherit; }
    button:active { transform: scale(0.96); }
    @keyframes slideDown {
      from { transform: translateY(-24px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    @keyframes popIn {
      0%   { transform: scale(0.8); opacity: 0; }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1);   opacity: 1; }
    }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    @media (max-width: 430px) {
      .phone-wrap { width: 100vw !important; height: 100svh !important; border-radius: 0 !important; border: none !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

// API Configuration
// ⚠️  Change this to your deployed backend URL before hosting.
// Using 'http://localhost:5000/api' only works when the backend
// is running on the same machine as the browser, which is never
// true for GitHub Pages or any other static hosting.
const API_URL = window.REPMAX_API_URL || 'http://localhost:5000/api';

// Design Tokens
const C = {
  bg: "#0A0F1E", surf: "#0F1929", surf2: "#162035", surf3: "#1A2640",
  border: "#1E3050", green: "#22C55E", orange: "#F97316", purple: "#A855F7",
  blue: "#3B82F6", text: "#F1F5F9", muted: "#64748B", gold: "#EAB308",
  danger: "#EF4444", teal: "#14B8A6",
};

// Auth Storage
const LS_KEY = "repmax_auth";
function saveToken(token) { localStorage.setItem(LS_KEY, token); }
function getToken() { return localStorage.getItem(LS_KEY); }
function clearToken() { localStorage.removeItem(LS_KEY); }

// Toast Component
function Toast({ msg, type }) {
  if (!msg) return null;
  const bg = type === "success" ? C.green : C.danger;
  return (
    <div style={{
      position:"absolute", top:60, left:12, right:12, zIndex:200,
      background:bg, borderRadius:14, padding:"13px 16px",
      color:"#fff", fontWeight:700, fontSize:14, textAlign:"center",
      boxShadow:`0 6px 28px ${bg}55`,
      animation:"slideDown 0.3s ease",
    }}>{msg}</div>
  );
}

// Auth Page
function AuthPage({ setAuthState, showToast }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [phone, setPhone] = useState("");
  const [password, setPassword] = useState("");
  const [passwordConfirm, setPasswordConfirm] = useState("");
  const [verificationCode, setVerificationCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [step, setStep] = useState("credentials");

  const handleSignup = async () => {
    if (!email && !phone) {
      showToast("Enter email or phone", "error");
      return;
    }
    if (password.length < 8) {
      showToast("Password must be 8+ chars", "error");
      return;
    }
    if (password !== passwordConfirm) {
      showToast("Passwords don't match", "error");
      return;
    }

    setLoading(true);
    try {
      const res = await fetch(`${API_URL}/auth/signup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, phone, password, passwordConfirm })
      });
      const data = await res.json();
      if (res.ok) {
        setStep("verify");
        showToast("Check your email/phone for code", "success");
      } else {
        showToast(data.msg || "Signup failed", "error");
      }
    } catch (err) {
      showToast("Backend not running?", "error");
    }
    setLoading(false);
  };

  const handleVerify = async () => {
    if (!verificationCode) {
      showToast("Enter code", "error");
      return;
    }

    setLoading(true);
    try {
      const res = await fetch(`${API_URL}/auth/verify`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email || undefined, phone: phone || undefined, code: verificationCode })
      });
      const data = await res.json();
      if (res.ok) {
        saveToken(data.token);
        setAuthState(true);
        showToast("Welcome! 🎉", "success");
      } else {
        showToast(data.msg || "Invalid code", "error");
      }
    } catch (err) {
      showToast("Error verifying", "error");
    }
    setLoading(false);
  };

  const handleLogin = async () => {
    if (!email && !phone) {
      showToast("Enter email or phone", "error");
      return;
    }
    if (!password) {
      showToast("Enter password", "error");
      return;
    }

    setLoading(true);
    try {
      const res = await fetch(`${API_URL}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email || undefined, phone: phone || undefined, password })
      });
      const data = await res.json();
      if (res.ok) {
        saveToken(data.token);
        setAuthState(true);
        showToast("Login successful 💪", "success");
      } else {
        showToast(data.msg || "Login failed", "error");
      }
    } catch (err) {
      showToast("Connection error", "error");
    }
    setLoading(false);
  };

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#060C1A"}}>
      <div style={{width:390,maxWidth:"100%",background:C.bg,borderRadius:44,padding:"40px 24px",display:"flex",flexDirection:"column",gap:20}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:900,color:C.green}}>RepMax 💪</div>
          <div style={{fontSize:13,color:C.muted,marginTop:4}}>Track your max reps</div>
        </div>

        <div style={{display:"flex",gap:10,background:C.surf2,borderRadius:12,padding:4}}>
          {["login", "signup"].map(m => (
            <button key={m} onClick={()=>{setMode(m); setStep("credentials");}} style={{
              flex:1,border:"none",borderRadius:10,padding:"10px 16px",
              background:mode===m?C.green:C.surf2,color:mode===m?"#000":C.muted,
              fontWeight:700,cursor:"pointer",fontSize:13,transition:"all 0.2s"
            }}>
              {m==="login"?"Login":"Sign Up"}
            </button>
          ))}
        </div>

        {step==="credentials" && (
          <>
            <input type="text" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={{
              background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",
              color:C.text,fontSize:14,outline:"none"
            }} />
            {mode==="signup" && (
              <input type="tel" placeholder="Phone (optional)" value={phone} onChange={e=>setPhone(e.target.value)} style={{
                background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",
                color:C.text,fontSize:14,outline:"none"
              }} />
            )}
            <input type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} style={{
              background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",
              color:C.text,fontSize:14,outline:"none"
            }} />
            {mode==="signup" && (
              <input type="password" placeholder="Confirm password" value={passwordConfirm} onChange={e=>setPasswordConfirm(e.target.value)} style={{
                background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",
                color:C.text,fontSize:14,outline:"none"
              }} />
            )}
            <button onClick={mode==="login"?handleLogin:handleSignup} disabled={loading} style={{
              border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:800,
              background:C.green,color:"#000",cursor:loading?"not-allowed":"pointer",opacity:loading?0.6:1
            }}>
              {loading?"Loading...":mode==="login"?"Login":"Create Account"}
            </button>
          </>
        )}

        {step==="verify" && (
          <>
            <div style={{textAlign:"center",color:C.muted,fontSize:13}}>Code sent to {email || phone}</div>
            <input type="text" placeholder="6-digit code" value={verificationCode} onChange={e=>setVerificationCode(e.target.value)} maxLength="6" style={{
              background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",
              color:C.text,fontSize:14,outline:"none",textAlign:"center",letterSpacing:2
            }} />
            <button onClick={handleVerify} disabled={loading} style={{
              border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:800,
              background:C.green,color:"#000",cursor:loading?"not-allowed":"pointer",opacity:loading?0.6:1
            }}>
              {loading?"Verifying...":"Verify"}
            </button>
            <button onClick={()=>setStep("credentials")} style={{
              border:`1px solid ${C.border}`,borderRadius:12,padding:"10px",fontSize:13,
              background:"none",color:C.blue,cursor:"pointer",fontWeight:600
            }}>
              Back
            </button>
          </>
        )}

        <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>
          {API_URL}
        </div>
      </div>
    </div>
  );
}

// Exercise definitions shared across pages
const EXES = [
  { id:"pushups", label:"Push Ups" },
  { id:"pullups", label:"Pull Ups" },
  { id:"situps",  label:"Sit Ups"  },
  { id:"squats",  label:"Squats"   },
];

const todayStr = () => new Date().toISOString().split("T")[0];

function calcPRs(logs) {
  const prs = { pushups: 0, pullups: 0, situps: 0, squats: 0 };
  logs.forEach(log => {
    EXES.forEach(ex => {
      if ((log[ex.id] || 0) > prs[ex.id]) prs[ex.id] = log[ex.id];
    });
  });
  return prs;
}

// Home Page
function HomePage({ logs, setPage }) {
  const prs = calcPRs(logs);
  const todayLogged = logs.some(l => l.date === todayStr());

  return (
    <div style={{padding:"0 14px 80px",display:"flex",flexDirection:"column",gap:14}}>
      <h2 style={{color:C.green,textAlign:"center"}}>Welcome back! 💪</h2>
      <div style={{background:C.surf,borderRadius:16,padding:"16px",border:`1px solid ${C.border}`,textAlign:"center"}}>
        <div style={{color:C.muted,fontSize:13}}>Total workouts logged</div>
        <div style={{fontSize:32,fontWeight:900,color:C.green}}>{logs.length}</div>
      </div>
      {todayLogged && (
        <div style={{background:`${C.green}18`,borderRadius:12,padding:"11px 15px",border:`1px solid ${C.green}44`,color:C.green,fontSize:13,fontWeight:600,textAlign:"center"}}>
          ✓ Workout logged today!
        </div>
      )}
      <button onClick={()=>setPage("log")} style={{
        border:"none",borderRadius:16,padding:"16px",fontSize:16,fontWeight:800,
        background:C.green,color:"#000",cursor:"pointer"
      }}>
        {todayLogged ? "Update Today's Workout" : "Log Workout"}
      </button>
      <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:.8}}>PERSONAL RECORDS</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {EXES.map(ex => (
          <div key={ex.id} style={{background:C.surf,borderRadius:16,padding:"14px 16px",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:6}}>{ex.label}</div>
            <div style={{fontSize:28,fontWeight:900,color:C.green}}>{prs[ex.id]}</div>
            <div style={{fontSize:10,color:C.muted}}>max reps</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Log Page
function LogPage({ logs, reps, setReps, onSubmit }) {
  const prs = calcPRs(logs);
  const canSubmit = Object.values(reps).some(v => v > 0);

  return (
    <div style={{padding:"0 14px 80px",display:"flex",flexDirection:"column",gap:14}}>
      <h2 style={{color:C.text,textAlign:"center",fontSize:18}}>Log Workout</h2>
      {EXES.map(ex => {
        const val = reps[ex.id];
        const isPR = val > 0 && val > prs[ex.id];
        return (
          <div key={ex.id} style={{background:C.surf,borderRadius:18,padding:"16px 18px",border:`1.5px solid ${isPR?C.green:C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:15,fontWeight:700,color:C.text}}>{ex.label}</span>
              {isPR && <span style={{background:`${C.green}22`,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:800,color:C.green}}>NEW PR!</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>setReps(r=>({...r,[ex.id]:Math.max(0,r[ex.id]-1)}))}
                style={{width:48,height:48,borderRadius:14,border:`1px solid ${C.border}`,background:C.surf2,cursor:"pointer",fontSize:22,color:C.text,flexShrink:0}}>−</button>
              <div style={{flex:1,textAlign:"center",fontSize:48,fontWeight:900,color:val>0?C.green:C.muted,lineHeight:1}}>{val}</div>
              <button onClick={()=>setReps(r=>({...r,[ex.id]:r[ex.id]+1}))}
                style={{width:48,height:48,borderRadius:14,border:"none",background:C.green,cursor:"pointer",fontSize:22,color:"#000",flexShrink:0}}>+</button>
            </div>
          </div>
        );
      })}
      <button onClick={onSubmit} disabled={!canSubmit} style={{
        border:"none",borderRadius:16,padding:"17px 24px",fontSize:16,fontWeight:800,
        cursor:canSubmit?"pointer":"not-allowed",
        background:canSubmit?C.green:C.surf2,
        color:canSubmit?"#000":C.muted,
        transition:"all 0.2s"
      }}>
        {canSubmit ? "Save Workout" : "Enter at least one exercise"}
      </button>
    </div>
  );
}

// Main App
function App() {
  const [isAuth, setIsAuth] = useState(!!getToken());
  const [logs, setLogs] = useState([]);
  const [page, setPage] = useState("home");
  const [reps, setReps] = useState({pushups:0,pullups:0,situps:0,squats:0});
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (isAuth) {
      fetchProfile();
    } else {
      setLoading(false);
    }
  }, [isAuth]);

  const fetchProfile = async () => {
    const token = getToken();
    if (!token) {
      setLoading(false);
      return;
    }
    try {
      const res = await fetch(`${API_URL}/auth/profile`, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      const data = await res.json();
      if (res.ok) {
        setLogs(data.logs || []);
      } else {
        clearToken();
        setIsAuth(false);
      }
    } catch (err) {
      console.error(err);
      // Network error: clear auth so the user can re-login when the
      // backend becomes reachable again.
      clearToken();
      setIsAuth(false);
    }
    setLoading(false);
  };

  const showToast = (msg, type="success") => {
    setToast({msg,type});
    setTimeout(()=>setToast(null), 3000);
  };

  const handleLogout = () => {
    clearToken();
    setIsAuth(false);
    showToast("Logged out");
  };

  const handleLog = async () => {
    if (!Object.values(reps).some(v => v > 0)) return;
    const entry = { date: todayStr(), ...reps };
    const token = getToken();
    // Optimistically update local state
    setLogs(prev => [...prev.filter(l => l.date !== todayStr()), entry]);
    try {
      await fetch(`${API_URL}/workouts/log`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify(entry)
      });
    } catch (err) {
      console.error("Failed to save workout to server:", err);
    }
    setReps({pushups:0,pullups:0,situps:0,squats:0});
    setPage("home");
    showToast("Workout logged! 💪");
  };

  if (!isAuth) {
    return <AuthPage setAuthState={setIsAuth} showToast={showToast} />;
  }

  if (loading) {
    return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:C.bg,color:C.green,fontSize:18}}>Loading...</div>;
  }

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:C.bg}}>
      <div style={{width:390,height:844,background:C.bg,borderRadius:44,overflow:"hidden",position:"relative",boxShadow:"0 36px 90px rgba(0,0,0,0.9)"}}>
        {toast && <Toast msg={toast.msg} type={toast.type}/>}

        <div style={{position:"absolute",top:0,bottom:60,left:0,right:0,overflowY:"auto",padding:"20px 0 0"}}>
          {page==="home" && <HomePage logs={logs} setPage={setPage} />}
          {page==="log"  && <LogPage logs={logs} reps={reps} setReps={setReps} onSubmit={handleLog} />}
        </div>

        <div style={{position:"absolute",bottom:0,left:0,right:0,display:"flex",gap:0,background:C.surf,borderTop:`1px solid ${C.border}`}}>
          {[{id:"home",label:"Home"},{id:"log",label:"Log"}].map(t=>(
            <button key={t.id} onClick={()=>setPage(t.id)} style={{
              flex:1,border:"none",background:"none",cursor:"pointer",padding:"12px 8px",
              color:page===t.id?C.green:C.muted,fontWeight:page===t.id?700:500,fontSize:13
            }}>{t.label}</button>
          ))}
          <button onClick={handleLogout} style={{
            flex:1,border:"none",cursor:"pointer",padding:"12px 8px",fontSize:13,
            fontWeight:600,background:"none",color:C.danger
          }}>Logout</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
